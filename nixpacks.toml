# Railway builds this app with Nixpacks.
#
# LightGBM (modules/ml_scorer.py) and, indirectly, scikit-learn ship
# compiled extensions that link against the OpenMP runtime,
# libgomp.so.1. That shared object is NOT present in the default
# Nixpacks runtime image, so `import lightgbm` crashes the gunicorn
# worker on boot with:
#
#   OSError: libgomp.so.1: cannot open shared object file:
#            No such file or directory
#
# Installing the Debian package `libgomp1` during the setup phase
# makes the library available at runtime.
[phases.setup]
aptPkgs = ["libgomp1"]
